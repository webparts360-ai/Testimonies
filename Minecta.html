document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n      wrap.removeEventListener('mousemove', this._onMove);\n      wrap.removeEventListener('mouseleave', this._onLeave);\n    }\n  }\n\n  _initNet() {\n    const wrap = this.netRef.current, canvas = this.netCanvas.current;\n    if (!wrap || !canvas) return;\n    const ctx = canvas.getContext('2d');\n    let W = 0, H = 0;\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const nodes = [];\n    const N = 42;\n    const mouse = { x: -999, y: -999, active: false };\n\n    const seed = () => {\n      nodes.length = 0;\n      for (let i = 0; i < N; i++) {\n        nodes.push({\n          x: Math.random() * W, y: Math.random() * H,\n          vx: (Math.random() - 0.5) * 0.22, vy: (Math.random() - 0.5) * 0.22,\n          r: 1.3 + Math.random() * 2.2, ph: Math.random() * Math.PI * 2\n        });\n      }\n    };\n    const resize = () => {\n      const rect = wrap.getBoundingClientRect();\n      W = rect.width; H = rect.height;\n      canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      if (!nodes.length) seed();\n    };\n    resize(); seed();\n\n    this._ro = new ResizeObserver(resize); this._ro.observe(wrap);\n    this._onMove = (e) => { const r = wrap.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top; mouse.active = true; };\n    this._onLeave = () => { mouse.active = false; mouse.x = -999; mouse.y = -999; };\n    wrap.addEventListener('mousemove', this._onMove);\n    wrap.addEventListener('mouseleave', this._onLeave);\n\n    const LINK = 98, MOUSE_R = 135;\n    let t = 0;\n    const frame = () => {\n      t += 0.016;\n      ctx.clearRect(0, 0, W, H);\n      for (const n of nodes) {\n        n.x += n.vx; n.y += n.vy;\n        if (mouse.active) {\n          const dx = mouse.x - n.x, dy = mouse.y - n.y, d = Math.hypot(dx, dy);\n          if (d < MOUSE_R && d > 0.01) { const f = (1 - d / MOUSE_R) * 0.045; n.vx += (dx / d) * f; n.vy += (dy / d) * f; }\n        }\n        n.vx *= 0.992; n.vy *= 0.992;\n        const sp = Math.hypot(n.vx, n.vy);\n        if (sp < 0.08) { const a = Math.random() * Math.PI * 2; n.vx += Math.cos(a) * 0.02; n.vy += Math.sin(a) * 0.02; }\n        if (sp > 0.95) { n.vx *= 0.9; n.vy *= 0.9; }\n        if (n.x < 0) { n.x = 0; n.vx = Math.abs(n.vx); }\n        if (n.x > W) { n.x = W; n.vx = -Math.abs(n.vx); }\n        if (n.y < 0) { n.y = 0; n.vy = Math.abs(n.vy); }\n        if (n.y > H) { n.y = H; n.vy = -Math.abs(n.vy); }\n      }\n      for (let i = 0; i < nodes.length; i++) {\n        for (let j = i + 1; j < nodes.length; j++) {\n          const a = nodes[i], b = nodes[j];\n          const dx = a.x - b.x, dy = a.y - b.y, d = Math.hypot(dx, dy);\n          if (d < LINK) {\n            let alpha = (1 - d / LINK) * 0.5;\n            if (mouse.active && Math.hypot((a.x + b.x) / 2 - mouse.x, (a.y + b.y) / 2 - mouse.y) < MOUSE_R) alpha = Math.min(0.95, alpha + 0.4);\n            ctx.strokeStyle = 'rgba(74,200,140,' + alpha + ')';\n            ctx.lineWidth = 1;\n            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();\n          }\n        }\n      }\n      for (const n of nodes) {\n        const pulse = 0.6 + 0.4 * Math.sin(t * 1.6 + n.ph);\n        const near = mouse.active && Math.hypot(mouse.x - n.x, mouse.y - n.y) < MOUSE_R;\n        const r = n.r * (near ? 1.6 : 1) * (0.85 + pulse * 0.3);\n        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 5);\n        g.addColorStop(0, 'rgba(120,230,170,' + (0.5 * pulse) + ')');\n        g.addColorStop(1, 'rgba(120,230,170,0)');\n        ctx.fillStyle = g;\n        ctx.beginPath(); ctx.arc(n.x, n.y, r * 5, 0, Math.PI * 2); ctx.fill();\n        ctx.fillStyle = near ? '#bff5d8' : '#5fe0a0';\n        ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2); ctx.fill();\n      }\n      this._raf = requestAnimationFrame(frame);\n    };\n    this._raf = requestAnimationFrame(frame);\n  }\n\n  phaseData() {\n    return [\n      {\n        num: '1', title: 'Diagnose',\n        body: \"We start with a needs analysis to surface the real knowledge gaps, skill deficiencies, and performance issues — so the program targets the actual problem, not a generic syllabus.\",\n        points: ['Stakeholder interviews & needs analysis', 'Map skill gaps to business outcomes', 'Define what success looks like upfront'],\n        img: 'https://images.pexels.com/photos/4623478/pexels-photo-4623478.jpeg?auto=compress&cs=tinysrgb&w=1200',\n        imgLabel: 'photo — discovery session with client'\n      },\n      {\n        num: '2', title: 'Design',\n        body: \"We set clear objectives, choose the right methods, and build a structured, interactive program around your team's learning preferences and the complexity of the content.\",\n        points: ['Tailored objectives & curriculum', 'Interactive, retention-first materials', 'Format matched to your audience'],\n        imgLabel: 'photo — program design / materials'\n      },\n      {\n        num: '3', title: 'Drive Change',\n        body: \"Trainers deliver through experiential methods — group discussions, hands-on exercises, role-play, and multimedia — prioritizing engagement so the learning translates to behaviour on the job.\",\n        points: ['Experiential, high-engagement delivery', 'Role-play & real-scenario practice', 'Reinforcement that sticks post-training'],\n        imgLabel: 'photo — live delivery in action'\n      }\n    ];\n  }\n\n  renderVals() {\n    const phoneRaw = '+60177867268';\n    const waLink = 'https://wa.me/60177867268';\n    const data = this.phaseData();\n    const cur = data[this.state.activeIdx];\n    const active = { ...cur, img: cur.img || '', noImg: !cur.img };\n\n    const phases = data.map((p, i) => {\n      const isActive = i === this.state.activeIdx;\n      return {\n        num: p.num, title: p.title,\n        select: () => this.setState({ activeIdx: i }),\n        tabStyle: `cursor:pointer; text-align:left; border-radius:14px; padding:20px 22px; border:1px solid ${isActive ? '#2fae6e' : 'rgba(255,255,255,0.12)'}; background:${isActive ? 'rgba(47,174,110,0.14)' : 'rgba(255,255,255,0.03)'}; color:#fff; transition:all .18s ease;`,\n        numStyle: isActive ? 'background:#2fae6e; color:#0e3d2c;' : 'background:rgba(255,255,255,0.1); color:#b9d8c8;'\n      };\n    });\n\n    return {\n      phone: this.props.phone ?? '017 786 7268',\n      phoneRaw, waLink,\n      netRef: this.netRef, netCanvas: this.netCanvas,\n      active, phases,\n      logos: ['client logo', 'client logo', 'client logo', 'client logo', 'client logo'],\n      modes: [\n        { abbr: 'IH', title: 'In House', desc: 'Delivered on-site, fully customized to your team.' },\n        { abbr: 'PB', title: 'Public Program', desc: 'Open-enrolment sessions for individual professionals.' },\n        { abbr: 'CO', title: 'Coaching', desc: 'One-to-one development for leaders and key talent.' },\n        { abbr: 'CS', title: 'Consultation', desc: 'Advisory on L&D strategy and capability building.' },\n        { abbr: 'OJ', title: 'On The Job', desc: 'Applied learning embedded in real daily work.' }\n      ],\n      stats: [\n        { value: '3D', label: 'disciplined process behind every program' },\n        { value: '5', label: 'flexible delivery formats' },\n        { value: '100%', label: 'customized to your organization' },\n        { value: '15min', label: 'to scope a tailored program with us' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
